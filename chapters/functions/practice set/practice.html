<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Practice set functions</title>
  </head>
  <body>
    <script>
      
      console.log(checkEvenOdd(20));
      console.log(checkGreater(14,5));
      console.log(convertTemp(30));


      function checkEvenOdd(number) {
        if (number % 2 === 0) {
          return `${number} is even`;
        } else {
          return `${number} is odd`;
        }
      }
      function checkGreater(num1, num2){
        if (num1 > num2){
            return `${num1} is greater than ${num2}`;
        } else{
            return `${num2} is greater than ${num1}`;
        }
      }
      function convertTemp(celcius){
        let farenheit = (9/5) * celcius + 32;
        return `Temperature in ${celcius} celcius is ${farenheit} in farenheit`;
      }
    </script>
  </body>
</html>
