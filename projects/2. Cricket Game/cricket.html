<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cricket Game</title>
    <style>
      body {
        text-align: center;
      }
    </style>
  </head>

  <body>
    <h1>Bat Ball Stump Game</h1>
    <button
      onclick="
        generateComputerChoice();
        let result;
        if (computerChoice === 'Ball') {
          result = 'User Won';
        } else if (computerChoice === 'Bat') {
          result = 'It\'s a tie';
        } else if (computerChoice === 'Stump') {
          result = 'Computer Won';
        }

        alert(
          `your choice is Bat.  computer choice is ${computerChoice} and ${result}`,
        );
      "
    >
      Bat
    </button>
    <button
      onclick="
        let randomNumberBall = Math.random() * 3;
        let computerChoiceBall;
        if (randomNumberBall > 0 && randomNumberBall <= 1) {
          computerChoiceBall = 'Bat';
        } else if (randomNumberBall > 1 && randomNumberBall <= 2) {
          computerChoiceBall = 'Ball';
        } else {
          computerChoiceBall = 'Stump';
        }

        //  result;
        if (computerChoiceBall === 'Ball') {
          result = 'It\'s a tie';
        } else if (computerChoiceBall === 'Bat') {
          result = 'Computer Won';
        } else if (computerChoiceBall === 'Stump') {
          result = 'User Won';
        }

        alert(
          `your choice is Ball.  computer choice is ${computerChoiceBall} and ${result}`,
        );
      "
    >
      Ball
    </button>
    <button
      onclick="
        randomNumberBall = Math.random() * 3;
        let computerChoiceStump;
        if (randomNumberBall > 0 && randomNumberBall <= 1) {
          computerChoiceStump = 'Bat';
        } else if (randomNumberBall > 1 && randomNumberBall <= 2) {
          computerChoiceStump = 'Ball';
        } else {
          computerChoiceStump = 'Stump';
        }

        //  result;
        if (computerChoiceStump === 'Stump') {
          result = 'It\'s a tie';
        } else if (computerChoiceStump === 'Bat') {
          result = 'User Won';
        } else if (computerChoiceStump === 'Ball') {
          result = 'Computer Won';
        }

        alert(
          `your choice is stump.  computer choice is ${computerChoiceStump} and ${result}`,
        );
      "
    >
      Stump
    </button>

    <script>
      let computerChoice;
      function generateComputerChoice() {
        //This generates randome number between 1 to 3
        let randomNumber = Math.random() * 3;

        if (randomNumber > 0 && randomNumber <= 1) {
          computerChoice = "Bat";
        } else if (randomNumber > 1 && randomNumber <= 2) {
          computerChoice = "Ball";
        } else {
          computerChoice = "Stump";
        }
      }
    </script>
  </body>
</html>
