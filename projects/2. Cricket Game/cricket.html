<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cricket Game</title>
    <style>
      body {
        text-align: center;
      }
    </style>
  </head>

  <body>
    <h1>Bat Ball Stump Game</h1>
    <button
      onclick="
        let computerChoice = generateComputerChoice();

        alert(
          `your choice is Bat.  computer choice is ${computerChoice} and ${result}`,
        );
      "
    >
      Bat
    </button>
    <button
      onclick="
        computerChoice = generateComputerChoice();

        //  result;
        if (computerChoice === 'Ball') {
          result = 'It\'s a tie';
        } else if (computerChoice === 'Bat') {
          result = 'Computer Won';
        } else if (computerChoice === 'Stump') {
          result = 'User Won';
        }

        alert(
          `your choice is Ball.  computer choice is ${computerChoice} and ${result}`,
        );
      "
    >
      Ball
    </button>
    <button
      onclick="
        computerChoice = generateComputerChoice();

        //  result;
        if (computerChoice === 'Stump') {
          result = 'It\'s a tie';
        } else if (computerChoice === 'Bat') {
          result = 'User Won';
        } else if (computerChoice === 'Ball') {
          result = 'Computer Won';
        }

        alert(
          `your choice is stump.  computer choice is ${computerChoice} and ${result}`,
        );
      "
    >
      Stump
    </button>

    <script>
      function generateComputerChoice() {
        //This generates randome number between 1 to 3
        let randomNumber = Math.random() * 3;
        let computerChoice;

        if (randomNumber > 0 && randomNumber <= 1) {
          return "Bat";
        } else if (randomNumber > 1 && randomNumber <= 2) {
          return "Ball";
        } else {
          return "Stump";
        }
      }

      function getResult(userMove, computerMove) {
        if (computerMove === userMove) {
          return "It's a tie";
        } else if (computerMove === "Bat" && userMove === "Ball") {
          return "Computer Won";
        } else if (computerMove === "Ball" && userMove === "Bat") {
          return "User Won";
        }
      }
    </script>
  </body>
</html>
