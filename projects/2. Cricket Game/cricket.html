<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cricket Game</title>
    <style>
      body {
        text-align: center;
      }
    </style>
  </head>

  <body>
    <h1>Bat Ball Stump Game</h1>
    <button
      onclick="
        let computerChoice = generateComputerChoice();
         let result = getResult('Bat', computerChoice);

        showResult('Bat',computerChoice,result);
      "
    >
      Bat
    </button>
    <button
      onclick="
        computerChoice = generateComputerChoice();

        result = getResult('Ball', computerChoice);

        showResult('Ball',computerChoice,result);
      "
    >
      Ball
    </button>
    <button
      onclick="
        computerChoice = generateComputerChoice();

        result = getResult('Stump', computerChoice);
        showResult('Stump',computerChoice,result);

       
      "
    >
      Stump
    </button>

    <script>
      function generateComputerChoice() {
        //This generates randome number between 1 to 3
        let randomNumber = Math.random() * 3;
        let computerChoice;

        if (randomNumber > 0 && randomNumber <= 1) {
          return "Bat";
        } else if (randomNumber > 1 && randomNumber <= 2) {
          return "Ball";
        } else {
          return "Stump";
        }
      }

      function getResult(userMove, computerMove) {
        if (userMove === "Bat") {
          if (computerMove === "Ball") {
            return "User won";
          } else if (computerMove === "Bat") {
            return `It's a tie`;
          } else if (computerMove === "Stump") {
            return "Coputer won";
          }
        } else if (userMove === "Ball") {
          if (computerMove === "Ball") {
            return `It's a tie`;
          } else if (computerMove === "Bat") {
            return "Coputer won";
          } else if (computerMove === "Stump") {
            return "User won";
          }
        } else {
          if (computerMove === 'Stump') {
          return 'It\'s a tie';
        } else if (computerMove === 'Bat') {
          return 'User Won';
        } else if (computerMove === 'Ball') {
          return 'Computer Won';
        }

        }

        // if (computerMove === userMove) {
        //   return "It's a tie";
        // } else if (computerMove === "Bat" && userMove === "Ball") {
        //   return "Computer Won";
        // } else if (computerMove === "Ball" && userMove === "Bat") {
        //   return "User Won";
        // }
      }

      function showResult (userMove, computerMove, result){
        alert(
          `your choice is ${userMove}.  computer choice is ${computerMove} and ${result}`,
        );

      }
    </script>
  </body>
</html>
